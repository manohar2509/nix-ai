AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  NIX AI - Clinical Trial Intelligence Platform.
  API Lambda (FastAPI) + Worker Lambda (SQS processor).
  Infrastructure (DynamoDB, S3, SQS, Cognito, Bedrock KB) is managed
  separately via infra/template.yaml or AWS Console.

# ── Parameters ──────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues: [development]
  CognitoUserPoolId:
    Type: String
    Default: us-east-1_rjx3Fv6lg
  CognitoAppClientId:
    Type: String
    Default: 937sqn4ogsomo8d6stlapvpo9
  BedrockKBId:
    Type: String
    Default: R8HXMHF97R
    Description: Bedrock Knowledge Base ID
  BedrockModelId:
    Type: String
    Default: amazon.nova-lite-v1:0
    Description: Bedrock foundation model ID for Converse API
  BoardroomModelId:
    Type: String
    Default: us.amazon.nova-pro-v1:0
    Description: Model for multi-agent boardroom debates
  CorsOrigins:
    Type: String
    Default: "https://nixai.example.com,https://9nffw9vxc5.execute-api.us-east-1.amazonaws.com,http://localhost:5173,http://localhost:3000"

# ── Globals ─────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    # x86_64 matches GitHub Actions ubuntu-latest runner — avoids cross-arch Docker builds
    Architectures: [x86_64]
    MemorySize: 512
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        ENV: !Ref Environment
        DEBUG: "false"
        LOG_LEVEL: INFO
        BUCKET_NAME: nixai-clinical-uploads
        KB_BUCKET_NAME: nixai-clinical-kb
        SQS_URL: !Sub "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/nixai-job-queue"
        DYNAMODB_TABLE: nixai-core
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_KB_ID: !Ref BedrockKBId
        BEDROCK_KB_MODEL_ARN: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}"
        BOARDROOM_MODEL_ID: !Ref BoardroomModelId
        CORS_ORIGINS: !Ref CorsOrigins

# ── Resources ───────────────────────────────────────────────────
Resources:

  # ── API Gateway Access Log Group ──────────────────────────────
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/nixai-api-${Environment}"
      RetentionInDays: 30

  # ── REST API Gateway ──────────────────────────────────────────
  NixAIRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency"}'
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
          LoggingLevel: ERROR
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Request-Id'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
      # Ensure CORS headers on 4xx/5xx from API Gateway itself
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Request-Id'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Request-Id'"

  # ── API Lambda ────────────────────────────────────────────────
  NixAIApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: NIX AI API - FastAPI on Lambda via Mangum
      CodeUri: .
      Handler: app.main.handler
      MemorySize: 1024
      Timeout: 29
      AutoPublishAlias: live
      Events:
        ApiCatchAll:
          Type: Api
          Properties:
            RestApiId: !Ref NixAIRestApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref NixAIRestApi
            Path: /
            Method: GET
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: nixai-core
        - S3CrudPolicy:
            BucketName: nixai-clinical-uploads
        - S3CrudPolicy:
            BucketName: nixai-clinical-kb
        - SQSSendMessagePolicy:
            QueueName: nixai-job-queue
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Converse
                - bedrock:ConverseStream
                - bedrock-agent-runtime:RetrieveAndGenerate
                - bedrock-agent-runtime:Retrieve
              Resource: "*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

  # ── Worker Lambda ─────────────────────────────────────────────
  NixAIWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: NIX AI Worker - SQS background processor
      CodeUri: .
      Handler: worker.handler.lambda_handler
      MemorySize: 1024
      Timeout: 900
      # ReservedConcurrentExecutions intentionally omitted — uses account unreserved pool.
      # Setting this to a fixed number can violate AWS's minimum of 10 unreserved executions
      # across the account and cause CREATE_FAILED during CloudFormation deployment.
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:nixai-job-queue"
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Policies:
        - DynamoDBCrudPolicy:
            TableName: nixai-core
        - S3CrudPolicy:
            BucketName: nixai-clinical-uploads
        - S3CrudPolicy:
            BucketName: nixai-clinical-kb
        - SQSSendMessagePolicy:
            QueueName: nixai-job-queue
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:Converse
                - bedrock:ConverseStream
                - bedrock-agent:ListDataSources
                - bedrock-agent:StartIngestionJob
                - bedrock-agent:GetIngestionJob
              Resource: "*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

# ── Outputs ─────────────────────────────────────────────────────
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${NixAIRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"
  ApiId:
    Description: API Gateway REST API ID
    Value: !Ref NixAIRestApi
    Export:
      Name: !Sub "${AWS::StackName}-ApiId"
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt NixAIApiFunction.Arn
  WorkerFunctionArn:
    Description: Worker Lambda function ARN
    Value: !GetAtt NixAIWorkerFunction.Arn
