name: NIX AI CI/CD

# ═══════════════════════════════════════════════════════════════
# TRIGGERS
# ═══════════════════════════════════════════════════════════════
on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, develop]
  
  # ✅ ENABLE MANUAL BUTTON (Runs both Frontend Check & Backend Deploy)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ─────────────────────────────────────────────────────────────
  # 1. Frontend Check (Runs on Push, PR, and Manual Trigger)
  #    Note: This validates the code. Deployment is done by Amplify.
  # ─────────────────────────────────────────────────────────────
  frontend-check:
    name: "🔨 Frontend Build Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "${{ env.FRONTEND_DIR }}/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>/dev/null || true

      - name: Build check
        run: npm run build
        env:
          # These are needed just to make the build pass validation
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy Backend (Runs on Push OR Manual Trigger)
  #    Skips on Pull Requests.
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend"
    # ✅ FIX: Run on Push OR Manual Button (workflow_dispatch)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve config environment
        id: config_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=default" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
          fi

      - name: SAM Build
        # --use-container is already set in samconfig.toml; listed here explicitly for clarity.
        # Architecture is x86_64 (matches this ubuntu-latest runner) — no cross-arch Docker needed.
        run: sam build --use-container --config-env ${{ steps.config_env.outputs.env_name }}

      - name: SAM Deploy
        run: |
          ENV_NAME="${{ steps.config_env.outputs.env_name }}"
          echo "Deploying to environment: $ENV_NAME from branch: ${{ github.ref_name }}"
          
          sam deploy --config-env $ENV_NAME \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --import-existing-resources

      - name: Save API Endpoint
        run: |
          STACK_NAME=nixai-backend
          
          # Fetch the API URL from CloudFormation outputs
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
            
          echo "API_URL=$ENDPOINT" >> $GITHUB_ENV
          echo "✅ Deployed Backend to: $ENDPOINT"

  # ─────────────────────────────────────────────────────────────
  # 3. Smoke Test (Runs immediately after Backend Deploy)
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: "🔍 Smoke Test"
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        run: |
          # Use the API URL from the deployed environment variable or Repository Variable
          # Note: In a real run, we might need to fetch it dynamically or use the fixed var.
          # For Hackathon, we use the VITE_API_URL var which should match the deployed API.
          
          TARGET_URL="${{ vars.VITE_API_URL }}"
          
          if [ -z "$TARGET_URL" ]; then
             echo "⚠️ VITE_API_URL variable not set. Skipping smoke test."
             exit 0
          fi

          echo "Pinging Health Check: $TARGET_URL/health"
          
          # Wait 10s for Lambda cold start
          sleep 10
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET_URL/health")
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 404 ]; then
            echo "✅ Success: API responded with $HTTP_CODE"
          else
            echo "❌ Failure: API responded with $HTTP_CODE"
            exit 1
          fi