# ═══════════════════════════════════════════════════════════════
# NIX AI — CI/CD Pipeline
#
# Architecture:
#   Frontend → AWS Amplify handles automatically on every push
#              (Auto-build is ON — no GitHub Actions step needed)
#   Backend  → SAM build + deploy to Lambda + API Gateway
#
# AWS Auth: Static IAM access keys (AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY)
#   Store both in GitHub → Settings → Secrets and variables → Actions → Secrets
#
# Triggers:
#   • Pull Request        → Frontend build check only (no deploy)
#   • Push to develop     → Deploy backend → Smoke test
#   • Push to main        → Deploy backend → Smoke test
#   • Push to staging     → Deploy backend (staging stack)
# ═══════════════════════════════════════════════════════════════

name: NIX AI CI/CD

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ═══════════════════════════════════════════════════════════════
# JOBS
# ═══════════════════════════════════════════════════════════════
jobs:

  # ─────────────────────────────────────────────────────────────
  # 1. Frontend Build Check (validation only — Amplify deploys)
  #    Amplify auto-builds on every push via its own Git integration.
  #    This job just validates the build compiles cleanly before merge.
  # ─────────────────────────────────────────────────────────────
  frontend-check:
    name: "🔨 Frontend Build Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "${{ env.FRONTEND_DIR }}/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>/dev/null || true

      - name: Build check
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy Backend (SAM → Lambda + API Gateway)
  #    Only runs on push to deploy branches (not PRs).
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        run: |
          ENV_NAME=${{ github.ref == 'refs/heads/main' && 'default' || 'staging' }}
          sam deploy --config-env $ENV_NAME \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print API Endpoint
        run: |
          STACK_NAME=${{ github.ref == 'refs/heads/main' && 'nixai-backend' || 'nixai-backend-staging' }}
          echo "✅ Deployed: $STACK_NAME"
          aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text

  # ─────────────────────────────────────────────────────────────
  # 3. Smoke Test — API health check after backend deploy
  #    Frontend is verified via Amplify's own build dashboard.
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: "🔍 Smoke Test"
    needs: [deploy-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Test API health endpoint
        run: |
          API_URL="${{ vars.VITE_API_URL }}"
          echo "Testing $API_URL/health ..."

          # Give Lambda a moment after fresh deploy (cold start)
          sleep 10

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")
          echo "Status: $STATUS"

          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 404 ]; then
            echo "✅ API is up!"
          else
            echo "❌ API health check failed (status $STATUS)"
            curl -v "$API_URL/health" 2>&1 | tail -20
            exit 1
          fi
